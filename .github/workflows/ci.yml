name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-app:${{ github.run_number }} .
          docker build -t ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest .

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-app:${{ github.run_number }}
          docker push ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Lightsail via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          script: |
            docker stop portfolio || true
            docker rm -f portfolio || true
            docker pull ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest
            docker run -d -p 8080:80 --name portfolio ${{ secrets.DOCKER_USERNAME }}/portfolio-app:latest
