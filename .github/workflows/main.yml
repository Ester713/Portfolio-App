name: my first pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4

      - name: login to docker hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: build image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ciportfolio .

      - name: push image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ciportfolio
